name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          add-to-path: false

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: armv7-linux-androideabi,aarch64-linux-android,i686-linux-android,x86_64-linux-android

      - name: Configure
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk | head -1)" >> local.properties

      - name: Build
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: proxydroid-cn-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: 自动构建的中文汉化版 ProxyDroid APK
          files: app/build/outputs/apk/debug/*.apk
